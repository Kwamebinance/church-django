<!DOCTYPE html>
<html><head><meta charset="utf-8"><title>QR — {{ m.member_code }}</title>
<style>
  body{font-family:system-ui,sans-serif;display:flex;align-items:center;justify-content:center;min-height:100vh;margin:0;}
  .card{text-align:center;padding:32px;border:1px solid #ddd;border-radius:12px;}
  .card svg{width:280px;height:280px;}
  .name{font-size:20px;font-weight:700;margin-top:12px;}
  .code{color:#666;font-family:monospace;margin-top:4px;}
  .church{color:#888;font-size:13px;margin-top:8px;}
  .hint{color:#aaa;font-size:12px;margin-top:16px;}
  @media print{.no-print{display:none;}}
  button{margin-top:20px;padding:8px 18px;border-radius:8px;border:1px solid #ccc;background:#fff;cursor:pointer;}
</style></head>
<body>
  <div class="card">
    <div>{{ qr_svg|safe }}</div>
    <div class="name">{{ m.surname }} {{ m.other_names }}</div>
    <div class="code">{{ m.member_code }}</div>
    <div class="church">{{ m.church.name }}</div>
    <div class="hint">Scan at an event to mark present.</div>
    <button class="no-print" onclick="window.print()">Print</button>
  </div>
</body></html>
