{% extends "base_auth.html" %}
{% block title %}Reset password{% endblock %}
{% block content %}
<h1 class="page-title">Reset your password</h1>
<p class="muted">Enter your phone number and we'll send a verification code.</p>
<form method="post">{% csrf_token %}
  <label>Phone number</label>{{ form.phone }}
  <button type="submit" style="width:100%;margin-top:18px;">Send code</button>
</form>
<div class="alt"><a href="{% url 'login_email' %}">Back to sign in</a></div>
{% endblock %}
